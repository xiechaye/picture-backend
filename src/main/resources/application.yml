server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: picture-backend
  profiles:
    active: local
  # 数据库配置
  datasource:
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/chaye_picture
      username: root
      password: 123456
    # pgvector
    vector:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/chaye_picture
      username: myuser
      password: EhpyKmjXRu714Q8GU4x1
  # rabbitmq
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual # 开启手动确认
        prefetch: 1 # 每次只取 1 条消息，防止 AI 处理慢导致消息堆积在内存
  # Spring AI 配置
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
    dashscope:
      api-key: apikey
      chat:
        options:
          model: qwen-plus
        embedding:
          options:
            model: text-embedding-v2
  # Redis 配置
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
      timeout: 5s
  # Session 配置
  session:
    store-type: redis
    # session 30 天后过期
    timeout: 2592000
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  # 空间图片分表
  shardingsphere:
    datasource:
      names: chaye_picture
      chaye_picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/chaye_picture
        username: root
        password: 123456
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: chaye_picture.picture # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture_sharding_algorithm  # 使用自定义分片算法
        sharding-algorithms:
          picture_sharding_algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.chaye.picturebackend.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: true


mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.chaye.picturebackend.controller
# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: xxx
    secretId: xxx
    secretKey: xxx
    region: xxx
    bucket: xxx
    # 是否启用 webp 格式转换（默认：false 保持原始格式）
    enable-webp-convert: false

# 验证码配置
captcha:
  # 验证码有效期（秒），默认 5 分钟
  expire-seconds: 300
  # 验证码宽度（像素）
  width: 120
  # 验证码高度（像素）
  height: 40
  # 验证码字符数
  code-count: 4
  # 干扰线数
  line-count: 5

# 文件上传配置
file:
  upload:
    # 图片上传最大大小（字节）
    max-picture-size: 52428800  # 50MB
    # 通用文件上传最大大小（字节）
    max-file-size: 52428800     # 50MB
    # 头像上传最大大小（字节）
    max-avatar-size: 5242880    # 5MB
    # 允许的图片格式
    allowed-picture-formats: jpeg,png,jpg,webp
    # 允许的文件格式
    allowed-file-formats: jpeg,jpg,png,gif,bmp,webp,ico

# 阿里云 AI 配置
aliYunAi:
  model: xxx
  apiKey: xxx

## 图像生成 Agent 配置
agent:
  image-generation:
    # 基础配置
    default-model: wanx-v1
    default-size: 1024*1024
    default-image-count: 1

    # 工具调用阶段配置
    max-tool-call-steps: 3            # 工具调用最大步数
    use-prompt-enhancer-tool: true    # 启用 Prompt 增强
    use-aspect-ratio-tool: true       # 启用尺寸推荐
    use-negative-prompt-tool: true    # 启用负面提示词
    prompt-enhancer-threshold: 100    # Prompt 增强阈值
    enable-smart-aspect-ratio: true   # 智能尺寸检测
    negative-prompt-format: "{prompt}\n\nAvoid: {negative}"  # 负面提示词格式

    # 轮询配置
    max-polling-retries: 60
    initial-polling-interval: 1000
    max-polling-interval: 5000
    use-exponential-backoff: true

    # 文件上传配置
    download-timeout: 30000
    upload-prefix: generated/
    temp-file-prefix: ai_generated_
    temp-file-suffix: .png

    # Prompt 长度限制
    min-prompt-length: 10
    max-prompt-length: 2000

